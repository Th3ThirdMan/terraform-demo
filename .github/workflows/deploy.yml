name: Deploy

on:
  push:
    branches:
      - main

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Deploy to EC2
        uses: appleboy/ssh-action@v1.0.0
        with:
          host: ${{ secrets.HOST }}
          username: ubuntu
          key: ${{ secrets.SSH_KEY }}
          script: |
            cd ~/terraform-demo/app
            git pull origin main
            docker rm -f flask-app || true
            docker build -t flask-app .
            docker run -d -p 80:5000 --name flask-app flask-app